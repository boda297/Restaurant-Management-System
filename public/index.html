<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestaurantOS — Management System</title>
  <meta name="description" content="Professional restaurant management dashboard for menu, orders, tables, reservations, and inventory." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MAIN APP — shown immediately, auto-login runs in background
════════════════════════════════════════════════════════════════════════════ -->
<div id="app" class="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">🍽️</span>
      <span class="sidebar-logo-text">RestaurantOS</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-page="orders" onclick="navigate('orders')">
        <span class="nav-icon">🧾</span><span class="nav-label">Orders</span>
        <span class="nav-badge" id="badge-orders" style="display:none">0</span>
      </a>
      <a class="nav-item" data-page="menu" onclick="navigate('menu')">
        <span class="nav-icon">🍴</span><span class="nav-label">Menu</span>
      </a>
      <a class="nav-item" data-page="tables" onclick="navigate('tables')">
        <span class="nav-icon">🪑</span><span class="nav-label">Tables</span>
      </a>
      <a class="nav-item" data-page="reservations" onclick="navigate('reservations')">
        <span class="nav-icon">📅</span><span class="nav-label">Reservations</span>
      </a>
      <a class="nav-item" data-page="inventory" onclick="navigate('inventory')">
        <span class="nav-icon">📦</span><span class="nav-label">Inventory</span>
      </a>
      <a class="nav-item" data-page="reports" onclick="navigate('reports')">
        <span class="nav-icon">📈</span><span class="nav-label">Reports</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info-small">
          <div class="user-name-small" id="user-name-small">Admin</div>
          <div class="user-role-small" id="user-role-small">Administrator</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sign out">⏻</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-wrap">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="clock" id="clock"></div>
        <button class="refresh-icon-btn" onclick="refreshCurrentPage()" title="Refresh">↻</button>
      </div>
    </header>

    <!-- Page content -->
    <main class="content" id="content">
      <div class="loading-page"><span class="spinner lg"></span></div>
    </main>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MODAL
════════════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     TOAST
════════════════════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>
</body>
</html>
